<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orijinal Super Mario Bros (1985)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #e52521;
            text-shadow: 2px 2px #b84418;
            letter-spacing: 2px;
            text-align: center;
        }

        /* Atari Kabini */
        .arcade-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            height: 480px;
            border: 6px solid #333;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            background: #000;
        }

        /* Yıllardır Kapanmayan En Stabil Retro Emulator Linki */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls-info {
            margin-top: 15px;
            font-size: 13px;
            color: #aaa;
            text-align: center;
            line-height: 1.6;
            max-width: 600px;
        }

        .btn-back {
            margin-top: 15px;
            padding: 8px 16px;
            background-color: #e52521;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>RETRO ATARİ SALONU</h1>
    
    <div class="arcade-container">
        <iframe src="https://www.retrogames.cc/embed/16847-super-mario-bros-japan-usa.html" allowfullscreen="true" scrolling="no"></iframe>
    </div>

    <div class="controls-info">
        <strong>Oyun Kumandası (Klavye):</strong><br>
        Oyun ekranına bir kez tıkla. <strong>Enter</strong> ile oyunu başlat.<br>
        Yön tuşları ile yürü. <strong>Z</strong> tuşu ile zıpla, <strong>X</strong> tuşu ile hız koşusu yap ve ateş et.
    </div>

    <a href="index.html" class="btn-back">Ana Sayfaya Dön</a>

</body>
</html>
