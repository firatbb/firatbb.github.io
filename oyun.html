<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Mario Tarzı Macera</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #info {
            margin-bottom: 15px;
            font-size: 18px;
            text-align: center;
        }
        canvas {
            background: #5c94fc; /* Mario Gökyüzü Mavisi */
            border: 4px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="info">
        <strong>Yön Tuşları</strong> veya <strong>A/D</strong> ile hareket et, <strong>Boşluk (Space)</strong> veya <strong>W</strong> ile zıpla!<br>
        Bölümü bitirmek için sağ taraftaki Yeşil/Altın Bitiş Çizgisine ulaş!
    </div>
    <canvas id="gameCanvas" width="800" height="440"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Oyun Ayarları
const gravity = 0.6;
const levelWidth = 3200; // Oyun dünyasının toplam uzunluğu (Baştan sona macera)

// Oyuncu (Mario benzeri küpümüz)
const player = {
    x: 100,
    y: 300,
    width: 32,
    height: 40,
    vx: 0,
    vy: 0,
    speed: 5,
    jumpForce: 12,
    grounded: false,
    color: "#e52521" // Mario Kırmızısı
};

// Kamera Pozisyonu
let cameraX = 0;
let gameStatus = "playing"; // playing, won, gameover

// Platformlar (Bloklar ve Zemin)
// x, y, genişlik, yükseklik, tip (ground, block, pipe, goal)
const platforms = [
    // Ana Zemin parçaları (Boşluklar bırakarak baştan sona uzanıyor)
    { x: 0, y: 400, width: 800, height: 40, type: "ground" },
    { x: 900, y: 400, width: 600, height: 40, type: "ground" },
    { x: 1600, y: 400, width: 800, height: 40, type: "ground" },
    { x: 2500, y: 400, width: 700, height: 40, type: "ground" },

    // İlk aşamadaki havada duran bloklar
    { x: 300, y: 280, width: 120, height: 30, type: "block" },
    { x: 500, y: 200, width: 40, height: 30, type: "block" },
    
    // Borular (Mario klasiği)
    { x: 1100, y: 320, width: 60, height: 80, type: "pipe" },
    { x: 1350, y: 280, width: 60, height: 120, type: "pipe" },

    // Zorlu zıplama yerleri (Boşluk üstü platformlar)
    { x: 1520, y: 250, width: 50, height: 20, type: "block" },
    { x: 1700, y: 280, width: 150, height: 30, type: "block" },
    { x: 1950, y: 200, width: 100, height: 30, type: "block" },

    // Merdiven basamakları (Bitiş öncesi)
    { x: 2600, y: 360, width: 40, height: 40, type: "block" },
    { x: 2640, y: 320, width: 40, height: 80, type: "block" },
    { x: 2680, y: 280, width: 40, height: 120, type: "block" },
    { x: 2720, y: 240, width: 40, height: 160, type: "block" },

    // BİTİŞ KALESİ / BAYRAĞI
    { x: 3000, y: 160, width: 20, height: 240, type: "goal" }
];

// Klavye Kontrolleri
const keys = {};
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

// Çarpışma Testi Fonksiyonu (AABB)
function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

// Oyun Döngüsü
function update() {
    if (gameStatus !== "playing") return;

    // Sağa Sola Hareket
    if (keys["ArrowRight"] || keys["KeyD"]) {
        player.vx = player.speed;
    } else if (keys["ArrowLeft"] || keys["KeyA"]) {
        player.vx = -player.speed;
    } else {
        player.vx = 0;
    }

    // Zıplama
    if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && player.grounded) {
        player.vy = -player.jumpForce;
        player.grounded = false;
    }

    // Yerçekimi Uygula
    player.vy += gravity;

    // Pozisyonları Güncelle (Önce X ekseni)
    player.x += player.vx;
    // Ekran dışına geri gitmeyi engelle
    if (player.x < 0) player.x = 0;

    // X Ekseni Çarpışma Kontrolü
    platforms.forEach(plat => {
        if (checkCollision(player, plat)) {
            if (plat.type === "goal") {
                gameStatus = "won";
            }
            if (plat.type !== "goal") {
                if (player.vx > 0) player.x = plat.x - player.width;
                if (player.vx < 0) player.x = plat.x + plat.width;
            }
        }
    });

    // Pozisyon Güncelle (Sonra Y ekseni)
    player.y += player.vy;
    player.grounded = false;

    // Y Ekseni Çarpışma Kontrolü
    platforms.forEach(plat => {
        if (checkCollision(player, plat)) {
            if (plat.type === "goal") {
                gameStatus = "won";
            }
            if (plat.type !== "goal") {
                // Üstüne basma
                if (player.vy > 0 && (player.y + player.height - player.vy) <= plat.y) {
                    player.y = plat.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                }
                // Alttan kafa atma
                else if (player.vy < 0 && (player.y - player.vy) >= plat.y + plat.height) {
                    player.y = plat.y + plat.height;
                    player.vy = 0;
                }
            }
        }
    });

    // Boşluğa Düşme Kontrolü (Game Over)
    if (player.y > canvas.height) {
        gameStatus = "gameover";
    }

    // Kamera Takibi (Oyuncu ekranın ortasına geldikten sonra kamera kayar)
    if (player.x > canvas.width / 2) {
        cameraX = player.x - canvas.width / 2;
    }
    // Kameranın oyun sınırlarını aşmasını engelle
    if (cameraX > levelWidth - canvas.width) {
        cameraX = levelWidth - canvas.width;
    }
}

// Çizim Döngüsü
function draw() {
    // Ekranı Temizle (Gökyüzü)
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // Kamerayı kaydırarak dünyayı çiziyoruz
    ctx.translate(-cameraX, 0);

    // Platformları ve Nesneleri Çiz
    platforms.forEach(plat => {
        if (plat.type === "ground") {
            ctx.fillStyle = "#d88a38"; // Toprak rengi
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            ctx.fillStyle = "#4c934c"; // Üst yeşillik
            ctx.fillRect(plat.x, plat.y, plat.width, 10);
        } else if (plat.type === "block") {
            ctx.fillStyle = "#b84418"; // Tuğla rengi
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
        } else if (plat.type === "pipe") {
            ctx.fillStyle = "#00a800"; // Boru yeşili
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            ctx.fillStyle = "#14d814"; // Boru parlaması
            ctx.fillRect(plat.x + 5, plat.y, 10, plat.height);
        } else if (plat.type === "goal") {
            ctx.fillStyle = "#fcfc00"; // Altın Bayrak Direği
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            // Yeşil Bayrak kısımı
            ctx.fillStyle = "#00a800";
            ctx.fillRect(plat.x - 30, plat.y, 30, 40);
        }
    });

    // Oyuncuyu Çiz (Mario)
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    // Göz ekleyelim (baktığı yöne göre basit bir detay)
    ctx.fillStyle = "#fff";
    ctx.fillRect(player.x + (player.vx >= 0 ? 20 : 4), player.y + 8, 8, 8);

    ctx.restore();

    // Oyun Durumu Ekranları
    if (gameStatus === "won") {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00f000";
        ctx.font = "bold 40px Arial";
        ctx.fillText("TEBRİKLER! OYUNU BİTİRDİNİZ 🎉", 100, 220);
        ctx.fillStyle = "#fff";
        ctx.font = "20px Arial";
        ctx.fillText("Tekrar oynamak için sayfayı yenileyin.", 240, 270);
    } else if (gameStatus === "gameover") {
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff2222";
        ctx.font = "bold 40px Arial";
        ctx.fillText("GAME OVER 💀", 260, 220);
        ctx.fillStyle = "#fff";
        ctx.font = "20px Arial";
        ctx.fillText("Tekrar denemek için sayfayı yenileyin.", 230, 270);
    }
}

// Ana Döngü Tetikleyicisi
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Oyunu Başlat
gameLoop();
</script>

</body>
</html>
