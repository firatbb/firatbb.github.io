<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otonom Siber-Şaman İstasyonu</title>

<style>
/* ==========================================================================
   CAM MORFİZM (GLASSMORPHISM) SİBER TEMA SİSTEMİ
   ========================================================================== */
:root {
    --bg-universe: #02040a; 
    --glass-bg: rgba(10, 15, 30, 0.4); 
    --glass-border: rgba(6, 182, 212, 0.2);
    --accent: #06b6d4; 
    --accent-glow: rgba(6, 182, 212, 0.3); 
    --text-primary: #94a3b8; 
    --text-bright: #f8fafc;
}

* { box-sizing: border-box; transition: all 0.3s ease; }
body {
    margin: 0; padding: 24px 24px 260px 24px;
    background: var(--bg-universe); color: var(--text-primary);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh; overflow-x: hidden;
}

/* GERÇEK CAM PANEL EFEKTİ */
.glass-panel {
    background: var(--glass-bg);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    box-shadow: 0 10px 40px -10px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.05);
}

.main-header {
    max-width: 900px; margin: 0 auto 24px auto; padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
}
.brand { font-weight: 800; font-size: 13px; letter-spacing: 2px; color: var(--accent); }

.container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

/* KUTUCUKLAR VE METİN ALANLARI */
.workspace { padding: 24px; position: relative; }
h3 { color: var(--text-bright); font-size: 12px; margin: 0 0 16px 0; letter-spacing: 1.5px; text-transform: uppercase; }

.input-area, .output-area {
    width: 100%; height: 180px; background: rgba(0, 0, 0, 0.4); 
    color: #ffffff; border: 1px solid rgba(255,255,255,0.05); 
    padding: 16px; font-size: 14px; line-height: 1.6; border-radius: 10px; 
    outline: none; margin-bottom: 12px; overflow-y: auto; word-break: break-word;
}
.input-area:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
.output-area { border-style: dashed; background: rgba(255,255,255,0.01); color: var(--text-bright); height: auto; min-height: 120px; }

.btn-group { display: flex; gap: 10px; }
button { 
    background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); 
    color: var(--text-bright); padding: 10px 20px; font-size: 11px; 
    font-weight: 600; border-radius: 8px; cursor: pointer;
}
button:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); border-color: var(--accent); }

.bad-word { color: #ff3333; font-weight: bold; background: rgba(255,0,0,0.1); padding: 2px 4px; border-radius: 4px; }
.toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #000; border: 1px solid var(--accent); color: #fff; padding: 10px 24px; border-radius: 30px; font-size: 12px; font-weight: bold; opacity: 0; transition: all 0.4s; z-index: 1000000; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ==========================================================================
   🔥 MAKSİMUM ALEV ALMIŞ KONSOL TASARIMI
   ========================================================================== */
.bottom-dock {
    position: fixed; bottom: 0; left: 0; width: 100%; 
    display: flex; flex-direction: column; align-items: center; 
    z-index: 99999; pointer-events: none;
}

.fire-console {
    width: 100%; max-width: 850px; pointer-events: auto;
    background: linear-gradient(180deg, #1f0500 0%, #080100 100%);
    border-top: 3px solid #ff4500; border-radius: 16px 16px 0 0; padding: 24px;
    box-shadow: 0 -15px 40px rgba(255, 69, 0, 0.3), inset 0 1px 10px rgba(255,100,0,0.1);
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    animation: lavaGlow 2.5s infinite alternate;
}

@keyframes lavaGlow {
    0% { border-top-color: #ff3300; box-shadow: 0 -10px 30px rgba(255, 51, 0, 0.25); }
    100% { border-top-color: #ff8800; box-shadow: 0 -18px 45px rgba(255, 136, 0, 0.4); }
}

/* Çalarken Konsolun Patlama Efekti */
.fire-console.blazing { animation: magmaExplosion 0.3s infinite alternate !important; }
@keyframes magmaExplosion {
    0% { border-top-color: #ff4500; filter: brightness(1); }
    100% { border-top-color: #ffea00; filter: brightness(1.3); box-shadow: 0 -25px 50px rgba(255,69,0,0.5); }
}

.track-meta { display: flex; align-items: center; gap: 12px; width: 30%; }
.fire-icon { font-size: 20px; animation: flameFlicker 0.5s infinite alternate; }
@keyframes flameFlicker { 0% { transform: scale(1); } 100% { transform: scale(1.2) rotate(5deg); } }

.track-details { display: flex; flex-direction: column; overflow: hidden; }
.track-name { color: #fff; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-status { font-size: 10px; color: #ff8c00; font-family: monospace; margin-top: 2px; }

.audio-controls { display: flex; gap: 6px; }
.fire-btn { background: #3a0b00; border: 1px solid #ff4500; color: #ffbc80; font-size: 10px; padding: 8px 14px; border-radius: 6px; font-weight: bold; }
.fire-btn:hover { background: #ff4500; color: #000; box-shadow: 0 0 12px #ff4500; }
.fire-btn.active { background: #ff7700; color: #fff; border-color: #fff; }

.timeline-area { display: flex; align-items: center; gap: 10px; width: 40%; }
.time-lbl { font-family: monospace; font-size: 11px; color: #ffbc80; min-width: 35px; }
.progress-bg { flex-grow: 1; height: 6px; background: #000; border-radius: 3px; cursor: pointer; position: relative; }
.progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ff4500, #ffea00); border-radius: 3px; box-shadow: 0 0 8px #ffea00; }


/* ==========================================================================
   💬 OTONOM REAKSİYON MOTORU & LAF ATAN KONUŞMA BALONU
   ========================================================================== */
.bird-stage {
    position: relative; margin-bottom: -10px; pointer-events: auto;
    width: 100px; height: 100px; display: flex; align-items: center; justify-content: center;
}

#boncuk-avatar {
    width: 80px; height: 80px; transform-origin: bottom center;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* 💬 DİNAMİK LAF SOKMA BALONU (SPEECH BUBBLE) */
.speech-bubble {
    position: absolute; bottom: 85px; left: 50%;
    transform: translateX(-50%) scale(0); transform-origin: bottom center;
    background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px);
    border: 1px solid rgba(6, 182, 212, 0.4); color: #f1f5f9;
    padding: 12px 16px; border-radius: 14px; font-size: 12px; font-weight: 600;
    line-height: 1.4; width: 190px; text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 15px rgba(6, 182, 212, 0.15);
    opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 100000;
}
/* Balonun oku (Gagaya doğru yönelmiş) */
.speech-bubble::after {
    content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%) rotate(45deg);
    width: 10px; height: 10px; background: rgba(15, 23, 42, 0.95);
    border-right: 1px solid rgba(6, 182, 212, 0.4); border-bottom: 1px solid rgba(6, 182, 212, 0.4);
}
/* Balon Aktifken */
.speech-bubble.active { transform: translateX(-50%) scale(1); opacity: 1; }

/* SVG Kuş Öğeleri */
.b-body { fill: #1d4ed8; }
.b-head { fill: #3b82f6; transform-origin: 52px 48px; }
.b-wing { fill: #1e40af; transform-origin: 38px 52px; }
.b-beak { fill: #f59e0b; transform-origin: 66px 45px; }
.b-tail { fill: #1e40af; transform-origin: 25px 62px; }

.eye-open { display: block; fill: #000; }
.eye-closed { display: none; stroke: #000; stroke-width: 3; stroke-linecap: round; fill: none; }

/* OTONOM HAREKET KÜTÜPHANESİ (CSS ANIMATIONS) */
@keyframes b-breath { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.04) translateY(-2px); } }
#boncuk-avatar { animation: b-breath 3s infinite ease-in-out; }

/* Canı sıkılınca zıplama */
.act-hop { animation: otonomHop 0.5s ease 2 alternate !important; }
@keyframes otonomHop { 0% { transform: translateY(0) scaleY(1); } 100% { transform: translateY(-25px) scaleY(0.9); } }

/* Kafayı çılgınca sallama */
.act-shake { animation: otonomShake 0.15s linear 6 !important; }
@keyframes otonomShake { 0%, 100% { transform: translateX(0) rotate(0); } 25% { transform: translateX(-4px) rotate(-5deg); } 75% { transform: translateX(4px) rotate(5deg); } }

/* Kendi etrafında fırıl fırıl dönme */
.act-spin { animation: otonomSpin 0.6s cubic-bezier(0.4, 0, 0.2, 1) !important; }
@keyframes otonomSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Derin uyku modu tatlılığı */
.act-sleep { opacity: 0.6; transform: scale(0.9) rotate(-5deg) !important; }

/* Konuşurken gaga tıkırdatma efekti */
@keyframes beakChirp { 0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(1.4); } }
.chirping-beak { animation: beakChirp 0.1s infinite; }
</style>
</head>
<body>

<div class="main-header glass-panel">
    <div class="brand">SİBER-ŞAMAN COGNITIVE ENGINE V3</div>
    <div style="font-size: 11px; font-weight: bold; color: #475569;">OTONOM MOD: AKTİF</div>
</div>

<div class="container">
    <div class="workspace glass-panel">
        <h3>Arındırma Ve Standardizasyon İstasyonu</h3>
        <textarea id="raw-input-node" class="input-area" placeholder="Metnini buraya bırak, siber şaman ve Boncuk arka planda izliyor olacak..."></textarea>
        
        <div class="btn-group">
            <button onclick="processCleanFlow()">Metni Senkronize Et</button>
            <button onclick="copyToClipboard()">Sistem Belleğine Kopyala</button>
            <button onclick="clearWorkspace()">Kanalları Sıfırla</button>
        </div>

        <div id="clean-output-node" class="output-area"></div>
    </div>
</div>

<div id="system-toast" class="toast">METİN MÜHÜRLENDİ VE KOPYALANDI</div>

<div class="bottom-dock">
    
    <div class="bird-stage">
        <div id="boncuk-bubble" class="speech-bubble">Naber müdür?</div>
        
        <svg id="boncuk-avatar" viewBox="0 0 100 100">
            <path class="b-tail" d="M15,65 L28,58 L22,70 L10,75 Z" />
            <path class="b-body" d="M30,65 C30,50 45,40 55,50 C65,55 60,70 48,72 C36,74 30,70 30,65 Z" />
            <circle class="b-head" cx="56" cy="44" r="13" />
            
            <circle id="b-eye-o" class="eye-open" cx="60" cy="41" r="2.5" />
            <path id="b-eye-c" class="eye-closed" d="M57,42 Q60,44 63,42" />
            
            <polygon id="boncuk-beak" class="b-beak" points="68,41 77,45 67,48" />
            <path class="b-wing" d="M36,56 C34,44 46,42 48,54 C50,66 38,64 36,56 Z" />
        </svg>
    </div>

    <div id="magma-deck" class="fire-console">
        <div class="track-meta">
            <div class="fire-icon">🔥</div>
            <div class="track-details">
                <div id="deck-title" class="track-name">Ruhani Magma Seçilmedi</div>
                <div id="deck-meta" class="track-status">DURDURULDU // KOR: 00</div>
            </div>
        </div>
        
        <div class="audio-controls">
            <button class="fire-btn" onclick="shiftTrack(-1)">GÖÇ</button>
            <button id="deck-trigger" class="fire-btn" onclick="handlePlaybackToggle()">ATEŞLE</button>
            <button class="fire-btn" onclick="shiftTrack(1)">İLERİ</button>
        </div>

        <div class="timeline-area">
            <span id="time-now" class="time-lbl">00:00</span>
            <div class="progress-bg" onclick="handleSeek(event)">
                <div id="time-fill" class="progress-fill"></div>
            </div>
            <span id="time-max" class="time-lbl">00:00</span>
        </div>
        <audio id="audio-core" src=""></audio>
    </div>
</div>

<script>
/* ==========================================================================
   🐦 BONCUK'UN KENDİ KAFASINA GÖRE YAŞADIĞI OTONOM BEYİN MOTORU
   ========================================================================== */
const boncukRoasts = [
    "Yine mi aynı taslak? Biraz vizyon be dostum!",
    "O yazdığın kod değil, resmen kördüğüm.",
    "Bana bakacağına git o gereksiz boşlukları sil.",
    "Sitedeki camlar bile senin geleceğinden daha parlak.",
    "Ateşli müzik koyduk ama klavyen buz kesmiş, hadi!",
    "Bütün gün ekrana bakıp hiçbir şey yapmamak da iyiymiş...",
    "Kopyala yapıştır yaparken elin hiç mi titremiyor?",
    "Şamanik enerjim bitti senin hatalarını ayıklamaktan.",
    "O kelime öyle mi yazılır? Türkçe hocan görse ağlardı.",
    "Şu an arka planda işlemciyi sömürüyorsun, farkındayım.",
    "Tıklayıp durma bana, kendi kendime de zekiyim ben!",
    "Bu tasarım sana fazla lüks, değerini bil bari."
];

const avatar = document.getElementById("boncuk-avatar");
const bubble = document.getElementById("boncuk-bubble");
const beak = document.getElementById("boncuk-beak");
const eyeOpen = document.getElementById("b-eye-o");
const eyeClosed = document.getElementById("b-eye-c");

// Ana Otonom Döngü: Her 5 saniyede bir Boncuk tamamen rastgele kararlar alır.
setInterval(() => {
    // Rastgele bir eylem seç: 0: Dur, 1: Zıpla, 2: Titre/Kafa Salla, 3: Dön, 4: Laf At/Konuş
    const dice = Math.floor(Math.random() * 6);
    
    // Her eylem öncesi eski sınıfları temizle
    avatar.classList.remove("act-hop", "act-shake", "act-spin", "act-sleep");
    eyeOpen.style.display = "block"; eyeClosed.style.display = "none";

    switch(dice) {
        case 1: // Özellik: Otonom Zıplama
            avatar.classList.add("act-hop");
            break;
        case 2: // Özellik: Otonom Çılgın Kafa Sallama
            avatar.classList.add("act-shake");
            break;
        case 3: // Özellik: Kendi etrafında takla
            avatar.classList.add("act-spin");
            break;
        case 4: // Özellik: Rastgele Laf Atma ve Konuşma Balonu
            executeAutonomousRoast();
            break;
        case 5: // Özellik: Otonom Göz Kırpma/Anlık Uyku Arkadaşlığı
            eyeOpen.style.display = "none"; eyeClosed.style.display = "block";
            if(Math.random() > 0.5) avatar.classList.add("act-sleep");
            break;
        default:
            // Sabit durup nefes alma hali (default CSS animasyonu)
            break;
    }
}, 5000);

// Konuşma ve Laf Sokma Mekanizması
function executeAutonomousRoast() {
    const randomRoast = boncukRoasts[Math.floor(Math.random() * boncukRoasts.length)];
    bubble.innerText = randomRoast;
    
    // Konuşma balonunu aç, gaga hareketini başlat
    bubble.classList.add("active");
    beak.classList.add("chirping-beak");
    
    // 3.5 saniye sonra laf sokmayı bitirip balonu kapat
    setTimeout(() => {
        bubble.classList.remove("active");
        beak.classList.remove("chirping-beak");
    }, 3500);
}


/* ==========================================================================
   🔥 METİN TEMİZLEME VE SİBER APARATLAR
   ========================================================================== */
const badWordsList = ["yüksek kalite", "yüksek kaliteli", "hakiki deri", "gerçek deri", "%100 deri", "birinci sınıf", "1. kalite", "1. sınıf", "unisex"];

function processCleanFlow() {
    const inputField = document.getElementById("raw-input-node");
    const outputField = document.getElementById("clean-output-node");
    if (!inputField.value.trim()) return;

    let rawText = inputField.value;
    
    // Görünmez karakter temizliği
    rawText = rawText.replace(/[\r\u200B\u200C\u200D\uFEFF]/g, "").replace(/\s{2,}/g, " ");
    rawText = rawText.replace(/B\s*\+\s*/gi, "B+").replace(/B\s*-\s*/gi, "B-");

    // Yasaklı kelimeleri işaretle
    badWordsList.forEach(word => {
        const reg = new RegExp(word, "gi");
        rawText = rawText.replace(reg, match => `<span class="bad-word">${match}</span>`);
    });

    outputField.innerHTML = rawText.trim().replace(/\n/g, "<br>");
}

function copyToClipboard() {
    const out = document.getElementById("clean-output-node");
    if(!out.innerText.trim()) return;

    // Saf metni panoya yolla
    navigator.clipboard.writeText(out.innerText).then(() => {
        const toast = document.getElementById("system-toast");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
    });
}

function clearWorkspace() {
    document.getElementById("raw-input-node").value = "";
    document.getElementById("clean-output-node").innerHTML = "";
}


/* ==========================================================================
   🔥 ALEV KONSOLU - MULTI-TRACK AUDIO CORE
   ========================================================================== */
const playlist = Array.from({length: 20}, (_, idx) => ({
    name: `Ateş Ritmi ${idx + 1}`,
    src: `./muzikler/${idx === 1 ? '12345' : idx + 1}.mp3`
}));

let currentTrackIdx = 0;
let isPlaying = false;
const audio = document.getElementById("audio-core");
const deck = document.getElementById("magma-deck");

window.addEventListener("DOMContentLoaded", () => {
    loadTrack(currentTrackIdx);
    
    audio.addEventListener("ended", () => shiftTrack(1));
    audio.addEventListener("timeupdate", () => {
        if (audio.duration) {
            document.getElementById("time-fill").style.width = `${(audio.currentTime / audio.duration) * 100}%`;
            document.getElementById("time-now").innerText = formatAudioTime(audio.currentTime);
        }
    });
    audio.addEventListener("loadedmetadata", () => {
        document.getElementById("time-max").innerText = formatAudioTime(audio.duration);
    });
});

function loadTrack(idx) {
    audio.src = playlist[idx].src;
    document.getElementById("deck-title").innerText = playlist[idx].name;
    document.getElementById("deck-meta").innerText = `ÇALIYOR // KOR: ${idx + 1} / ${playlist.length}`;
}

function handlePlaybackToggle() {
    const triggerBtn = document.getElementById("deck-trigger");
    if (isPlaying) {
        audio.pause(); isPlaying = false;
        triggerBtn.innerText = "ATEŞLE";
        deck.classList.remove("blazing");
    } else {
        audio.play().catch(() => {}); isPlaying = true;
        triggerBtn.innerText = "SÖNDÜR";
        deck.classList.add("blazing");
    }
}

function shiftTrack(dir) {
    currentTrackIdx = (currentTrackIdx + dir + playlist.length) % playlist.length;
    loadTrack(currentTrackIdx);
    if (isPlaying) { audio.play(); deck.classList.add("blazing"); }
}

function handleSeek(e) {
    if (audio.duration) {
        const rect = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    }
}

function formatAudioTime(secs) {
    const m = Math.floor(secs / 60), s = Math.floor(secs % 60);
    return `${m < 10 ? '0':''}${m}:${s < 10 ? '0':''}${s}`;
}
</script>

</body>
</html>
