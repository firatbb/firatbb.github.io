<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tengri</title>

<style>
/* ==========================================================================
   EPIC PREMIUM COLOR THEMES (MAT, AĞIRBAŞLI VE LÜKS)
   ========================================================================== */

/* 1. DEFAULT: MIDNIGHT OLED (ZİFİRİ MAT DERİN SİYAH) */
:root {
    --bg-main: #000000;
    --bg-container: #09090a;
    --bg-input: #020203;
    --bg-btn: #121214;
    --bg-btn-hover: #1a1a1e;
    --bg-tab-active: #1a1a1e;
    --text-main: #8e8e93;
    --text-input: #f2f2f7;
    --text-heading: #ffffff;
    --text-btn: #aeaeb2;
    --border-color: #242426;
    --border-container: #1c1c1e;
    --accent-color: #f2f2f7; 
    --accent-glow: rgba(255, 255, 255, 0.15);
}

/* TEMA RENKLERİ GERİ KALANLAR */
html[data-theme="crimson"] {
    --bg-main: #0c0808;
    --bg-container: #161010; --bg-input: #080505; --bg-btn: #241818; --bg-btn-hover: #332222; --bg-tab-active: #332222; --text-main: #b8a0a0; --text-input: #f5eded; --text-heading: #ffffff; --text-btn: #e63946; --border-color: #402b2b;
    --border-container: #2e1f1f; --accent-color: #d62828; --accent-glow: rgba(214, 40, 40, 0.4);
}
html[data-theme="blue"] {
    --bg-main: #080c14; --bg-container: #101624; --bg-input: #05080d;
    --bg-btn: #182238; --bg-btn-hover: #22304f; --bg-tab-active: #22304f; --text-main: #a0b0c8; --text-input: #edf3f8; --text-heading: #ffffff; --text-btn: #4ea8de; --border-color: #2b3d61; --border-container: #1f2c47; --accent-color: #0077b6;
    --accent-glow: rgba(0, 119, 182, 0.4);
}
html[data-theme="green"] {
    --bg-main: #060c08; --bg-container: #0d1a12; --bg-input: #040906; --bg-btn: #162e20; --bg-btn-hover: #1f422e;
    --bg-tab-active: #1f422e; --text-main: #9ebda8; --text-input: #ecf5ef; --text-heading: #ffffff; --text-btn: #52b788; --border-color: #275239; --border-container: #1c3b29; --accent-color: #2d6a4f;
    --accent-glow: rgba(45, 106, 79, 0.4);
}
html[data-theme="purple"] {
    --bg-main: #0a0712; --bg-container: #151024; --bg-input: #06040d; --bg-btn: #211938; --bg-btn-hover: #2f244f;
    --bg-tab-active: #2f244f; --text-main: #a8a0c8; --text-input: #f0edf8; --text-heading: #ffffff; --text-btn: #b5179e; --border-color: #3b2d61; --border-container: #2a2047; --accent-color: #7209b7;
    --accent-glow: rgba(114, 9, 183, 0.4);
}
html[data-theme="pink"] {
    --bg-main: #0f070b; --bg-container: #1f1019; --bg-input: #0a0408; --bg-btn: #331a29; --bg-btn-hover: #472439;
    --bg-tab-active: #472439; --text-main: #cda2bd; --text-input: #faf0f6; --text-heading: #ffffff; --text-btn: #ff758f; --border-color: #592d47; --border-container: #422135; --accent-color: #ff4d6d;
    --accent-glow: rgba(255, 77, 109, 0.4);
}
html[data-theme="yellow"] {
    --bg-main: #0d0c04; --bg-container: #1c1a09; --bg-input: #090802; --bg-btn: #2e2a10; --bg-btn-hover: #403b16;
    --bg-tab-active: #403b16; --text-main: #cfcb9e; --text-input: #fbfbfa; --text-heading: #ffffff; --text-btn: #ffd166; --border-color: #524b1c; --border-container: #3d3815; --accent-color: #ffb703;
    --accent-glow: rgba(255, 183, 3, 0.4);
}
html[data-theme="orange"] {
    --bg-main: #0d0a06; --bg-container: #1c150d; --bg-input: #080604; --bg-btn: #2b2114; --bg-btn-hover: #372d1d;
    --bg-tab-active: #372d1d; --text-main: #c2b29e; --text-input: #f7f3ed; --text-heading: #ffffff; --text-btn: #f3a712; --border-color: #4f3d26; --border-container: #3b2e1c; --accent-color: #e67e22;
    --accent-glow: rgba(230, 126, 34, 0.4);
}
html[data-theme="slate"] {
    --bg-main: #121315; --bg-container: #1e2024; --bg-input: #0b0c0d; --bg-btn: #2d3138; --bg-btn-hover: #3f444f;
    --bg-tab-active: #3f444f; --text-main: #949a8c; --text-input: #f1f2f4; --text-heading: #ffffff; --text-btn: #90e0ef; --border-color: #474d59; --border-container: #333840; --accent-color: #00b4d8;
    --accent-glow: rgba(0, 180, 216, 0.3);
}
html[data-theme="white"] {
    --bg-main: #f1f3f6; --bg-container: #ffffff; --bg-input: #f8fafc; --bg-btn: #e4e9f0; --bg-btn-hover: #d1d9e6;
    --bg-tab-active: #ffffff; --text-main: #4a5568; --text-input: #1a202c; --text-heading: #1a202c; --text-btn: #4a5568; --border-color: #cbd5e1; --border-container: #e2e8f0; --accent-color: #2d3748;
    --accent-glow: rgba(45, 55, 72, 0.1);
}

*{box-sizing:border-box;}
html, body, .input-area, div { cursor: default; }
button, .tab-btn, .theme-dot, .oracle-sphere { cursor: pointer; }

body {
    margin:0;
    padding:20px 20px 140px 20px; 
    background: var(--bg-main) !important; 
    color: var(--text-main) !important;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    overflow-x:hidden;
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
}

.theme-selector { display: flex; justify-content: flex-end; gap: 12px; max-width: 900px; margin: 0 auto 20px auto; align-items: center; background: var(--bg-container);
    padding: 12px 18px; border-radius: 8px; border: 1px solid var(--border-container); }
.theme-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;
    color: var(--text-main); opacity: 0.8; }
.theme-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
.theme-dot:hover { transform: scale(1.2); }
.theme-dot.active { border-color: var(--text-heading) !important; transform: scale(1.1); box-shadow: 0 0 12px var(--accent-color); }

.oracle-box { max-width: 900px;
    margin: 0 auto 25px auto; background: var(--bg-container); border: 1px solid var(--border-container); border-radius: 10px; padding: 20px; display: flex; align-items: center;
    gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
.oracle-sphere-wrapper { position: relative; flex-shrink: 0; }
.oracle-sphere { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, var(--text-heading), var(--accent-color));
    box-shadow: 0 0 20px var(--accent-glow), inset -5px -5px 15px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 24px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); user-select: none; }
.oracle-sphere:hover { transform: scale(1.1) rotate(15deg);
    box-shadow: 0 0 30px var(--accent-color), inset -2px -2px 10px rgba(0,0,0,0.4); }
.oracle-sphere:active { transform: scale(0.95); }
.oracle-text-area { flex-grow: 1; }
.oracle-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); font-weight: 700; margin-bottom: 4px; }
.oracle-quote { font-size: 14px; color: var(--text-input);
    font-style: italic; line-height: 1.5; transition: opacity 0.2s ease; }
.pulse-glow { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: var(--accent-color);
    opacity: 0.15; animation: spherePulse 2s infinite ease-in-out; top: 0; left: 0; pointer-events: none; }
@keyframes spherePulse { 0% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.3); opacity: 0; } 100% { transform: scale(1); opacity: 0.2; } }
.glitch-effect { animation: textGlitch 0.2s linear 2; }
@keyframes textGlitch { 0% { transform: translate(2px, 1px); opacity: 0.7; } 50% { transform: translate(-1px, -1px); opacity: 0.9; } 100% { transform: translate(0, 0); opacity: 1; } }

.tabs{ display:flex; justify-content:center; gap:12px; margin-bottom:25px; }
button, .tab-btn { background: var(--bg-btn); color: var(--text-btn); border: 1px solid var(--border-color); padding: 12px 26px; font-size: 12px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase; border-radius: 6px; transition: all 0.2s ease; }
button:hover, .tab-btn:hover { color: var(--text-heading) !important; background: var(--bg-btn-hover); border-color: var(--accent-color);
    box-shadow: 0 0 12px var(--accent-glow); }
.tab-btn.active { background: var(--bg-tab-active) !important; color: var(--text-heading) !important; border-color: var(--accent-color) !important;
    box-shadow: 0 0 15px var(--accent-glow); }

.container{ position:relative; width:100%; max-width: 900px; margin: 0 auto; }
.tab-content{ position:absolute; width:100%; opacity:0; transform:scale(0.99);
    transition: all .25s ease-in-out; pointer-events:none; background: var(--bg-container); padding: 28px; border-radius: 10px; border: 1px solid var(--border-container); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.tab-content.active{ opacity:1; transform:scale(1); position:relative; pointer-events:auto; }

h3 { color: var(--text-heading); font-size: 14px; margin-top: 0; margin-bottom: 22px; letter-spacing: 1px; text-transform: uppercase;
    border-left: 3px solid var(--accent-color); padding-left: 12px; font-weight: 600; }
.input-area, .output{ width:100%; height:220px; background: var(--bg-input); color: var(--text-input); border: 1px solid var(--border-color);
    padding:16px; font-size: 14px; line-height: 1.6; border-radius: 6px; outline: none; transition: all 0.2s ease; margin-bottom: 6px; overflow-y: auto; word-break: break-word;
    font-family: inherit; }
.input-area:focus, .output:focus { border-color: var(--accent-color); box-shadow: 0 0 10px var(--accent-glow); }
.output{ min-height:220px; height: auto; border-style: dashed; }
.meta-info { font-size: 11px; color: var(--text-main); margin-bottom: 18px; display: flex; gap: 18px; opacity: 0.7; letter-spacing: 0.5px; }
.meta-info span strong { color: var(--text-heading); }
.action-buttons { margin-bottom: 25px; display: flex; gap: 12px; flex-wrap: wrap; }
.bad-word{ color:#ff3366; font-weight:600;
    background:rgba(255, 51, 102, 0.08); border: 1px solid rgba(255, 51, 102, 0.3); padding:2px 6px; border-radius:4px; }
.toast { position: fixed; top: -100px;
    right: 25px; background: var(--bg-container); border: 1px solid var(--accent-color); color: var(--text-heading); padding: 14px 28px; border-radius: 6px; font-size: 12px; font-weight: 600;
    letter-spacing: 1px; box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--accent-glow); transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10000; }
.toast.show { top: 25px; }
.watermark{ position:fixed; bottom:160px; left:0; width:100%; text-align:center; font-size:70px; font-weight:900; letter-spacing:25px; pointer-events:none; user-select:none; opacity: 0.015; color: var(--text-heading);
    animation: pulse 5s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{transform:scale(1); opacity: 0.012;} 50%{transform:scale(1.01); opacity: 0.02;} }

/* ==========================================================================
   🎵 PREMIUM CYBER AUDIO PLAYER STYLES (MINIMALIST & ADVANCED)
   ========================================================================= */
.cyber-player {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: var(--bg-container);
    border-top: 1px solid var(--border-container);
    padding: 10px 30px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
    z-index: 9999;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
}
.cyber-player.minimized {
    transform: translateY(100%);
}
.player-toggle-btn {
    position: absolute;
    right: 30px;
    top: -24px;
    background: var(--bg-container);
    border: 1px solid var(--border-container);
    border-bottom: none;
    padding: 4px 14px;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 1px;
    border-radius: 6px 6px 0 0;
    color: var(--text-main);
    transition: all 0.2s, top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
}
.cyber-player.minimized .player-toggle-btn {
    top: -24px;
    border: 1px solid var(--border-container);
    box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
}
.player-toggle-btn:hover {
    color: var(--text-heading);
    background: var(--bg-btn-hover);
}
.player-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
}
.player-info {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 30%;
}
.player-icon {
    font-size: 18px;
    animation: rotateDisc 4s linear infinite;
    animation-play-state: paused;
}
.cyber-player.playing .player-icon {
    animation-play-state: running;
}
@keyframes rotateDisc {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
.track-details {
    display: flex;
    flex-direction: column;
}
.track-name {
    color: var(--text-heading);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
}
.track-index {
    color: var(--text-main);
    font-size: 10px;
    opacity: 0.5;
    margin-top: 1px;
}
.player-controls {
    display: flex;
    align-items: center;
    gap: 6px;
}
.player-btn {
    padding: 6px 12px;
    font-size: 10px;
    letter-spacing: 0.5px;
    background: var(--bg-btn);
    border: 1px solid var(--border-color);
    text-transform: uppercase;
}
.player-btn.active-mode {
    border-color: var(--accent-color);
    color: var(--text-heading);
    box-shadow: 0 0 8px var(--accent-glow);
}
.player-timeline-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
}
.time-display {
    font-size: 11px;
    font-family: monospace;
    color: var(--text-main);
    min-width: 35px;
    opacity: 0.8;
}
.timeline-container {
    flex-grow: 1;
    height: 4px;
    background: var(--bg-input);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
}
.timeline-progress {
    height: 100%;
    width: 0%;
    background: var(--accent-color);
    box-shadow: 0 0 6px var(--accent-color);
    border-radius: 2px;
    pointer-events: none;
}

/* ==========================================================================
   ☕ REVIZE KAHVE MOLASI VE ⚡ SİTE ÇAPINDA TENGRİ PANİK ANIMASYONLARI
   ========================================================================== */
.coffee-btn-premium {
    margin-right: auto;
    background: linear-gradient(135deg, rgba(230, 126, 34, 0.08), rgba(211, 84, 0, 0.14));
    border: 1px solid rgba(230, 126, 34, 0.35);
    color: #e67e22 !important;
    padding: 7px 18px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    border-radius: 20px;
    box-shadow: 0 0 10px rgba(230, 126, 34, 0.05);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-flex;
    align-items: center;
    gap: 4px;
}
.coffee-btn-premium:hover {
    background: #e67e22 !important;
    color: #ffffff !important;
    box-shadow: 0 0 20px rgba(230, 126, 34, 0.4);
    transform: translateY(-1px);
}

/* BUTON İÇİ EMOJİ DUMAN MEKANİZMASI */
.btn-emoji-wrapper {
    position: relative;
    display: inline-block;
}
.btn-steam-box {
    position: absolute;
    top: -10px;
    left: 2px;
    display: flex;
    gap: 2px;
    pointer-events: none;
}
.btn-steam {
    width: 1.5px;
    height: 8px;
    background: rgba(230, 126, 34, 0.6);
    border-radius: 50%;
    filter: blur(0.6px);
    opacity: 0;
    animation: btnSteamRise 2s infinite ease-in-out;
}
.coffee-btn-premium:hover .btn-steam {
    background: rgba(255, 255, 255, 0.8);
}
.btn-steam:nth-child(2) { animation-delay: 0.7s; }
@keyframes btnSteamRise {
    0% { transform: translateY(2px) scaleX(1); opacity: 0; }
    50% { transform: translateY(-2px) scaleX(1.4); opacity: 0.8; }
    100% { transform: translateY(-6px) scaleX(0.5); opacity: 0; }
}

.coffee-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(4, 4, 5, 0.94); backdrop-filter: blur(25px);
    z-index: 100000; display: none; align-items: center; justify-content: center;
    flex-direction: column; opacity: 0;
    transition: opacity 0.4s ease;
}
.coffee-overlay.show { display: flex; opacity: 1; }
.cup-wrapper { position: relative; display: flex; flex-direction: column; align-items: center;
    margin-bottom: 45px; }

/* ASİL VE ŞEFFAF GLASS KUPA TASARIMI + AKICI SIVI */
.glass-cup {
    width: 110px;
    height: 120px; 
    border: 2px solid rgba(255, 255, 255, 0.45); 
    border-bottom-left-radius: 35px; border-bottom-right-radius: 35px;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
    position: relative;
    box-shadow: inset 0 0 25px rgba(255,255,255,0.15), 0 25px 50px rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    overflow: hidden;
}
.glass-cup::after {
    content: '';
    position: absolute;
    bottom: 6px; left: 6px; right: 6px;
    height: 72px;
    background: linear-gradient(to top, rgba(92, 60, 42, 0.9), rgba(143, 94, 66, 0.75));
    border-bottom-left-radius: 26px;
    border-bottom-right-radius: 26px;
    border-top-left-radius: 4px;
    border-top-right-radius: 4px;
    box-shadow: 0 0 15px rgba(92, 60, 42, 0.6);
    animation: liquidWave 3.5s infinite ease-in-out;
    transform-origin: center bottom;
}
@keyframes liquidWave {
    0%, 100% { transform: rotate(0deg) scaleY(1); }
    50% { transform: rotate(2deg) scaleY(1.02); }
}
.cup-ear {
    width: 28px; height: 60px;
    border: 2px solid rgba(255, 255, 255, 0.45); border-left: none;
    border-top-right-radius: 20px; border-bottom-right-radius: 20px;
    position: absolute; right: -29px; top: 25px;
}
.cup-plate {
    width: 170px; height: 3px; background: rgba(255, 255, 255, 0.4);
    margin-top: 18px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    border-radius: 2px;
}
.steam-box { position: absolute; top: -50px; display: flex; gap: 16px; justify-content: center;
    width: 100%; }
.steam-puff {
    width: 3px; height: 45px; 
    background: linear-gradient(to top, rgba(255,255,255,0.45), rgba(255,255,255,0)); 
    opacity: 0;
    border-radius: 50%;
    filter: blur(3px); animation: steamRise 2.8s infinite ease-in-out;
}
.steam-puff:nth-child(1) { animation-delay: 0s; }
.steam-puff:nth-child(2) { animation-delay: 0.8s; }
.steam-puff:nth-child(3) { animation-delay: 1.6s; }
@keyframes steamRise {
    0% { transform: translateY(15px) scaleX(0.8); opacity: 0; }
    40% { transform: translateY(-5px) scaleX(1.4); opacity: 0.45; }
    80% { transform: translateY(-25px) scaleX(0.9); opacity: 0.1; }
    100% { transform: translateY(-35px) scaleX(0.4); opacity: 0; }
}

/* TÜM TEMALARA UYUMLU, OKUNAKLI VE HUZURLU ULTRA SOFT NEFES ALMA EFEKTİ */
.mola-quote { 
    max-width: 650px;
    text-align: center; font-size: 16px; 
    color: #f2f2f7 !important; /* Tüm temalarda görünürlük için mat beyaz */
    text-shadow: 0 2px 15px rgba(255, 255, 255, 0.1), 0 4px 30px rgba(0, 0, 0, 0.5);
    font-style: italic; min-height: 70px; padding: 0 25px; font-weight: 300; 
    letter-spacing: 0.8px; line-height: 1.8; opacity: 1;
    transition: opacity 1.5s ease-in-out;
}
.mola-quote.fade-out {
    opacity: 0;
}

/* SİTENİN BİR YERLERİNE SÜREKLİ ÇARPIP SEKEN BUTON ANİMASYONLARI */
@keyframes chaosBounce1 {
    0% { transform: translate(0, 0); }
    10% { transform: translate(calc(50vw - 120px), calc(-35vh + 60px)); }
    20% { transform: translate(calc(-45vw + 60px), calc(40vh - 120px)); }
    30% { transform: translate(calc(40vw - 60px), calc(-25vh + 110px)); }
    40% { transform: translate(calc(-48vw + 120px), calc(-42vh + 60px)); }
    50% { transform: translate(calc(25vw - 120px), calc(35vh - 60px)); }
    60% { transform: translate(calc(-38vw + 90px), calc(-20vh + 50px)); }
    70% { transform: translate(calc(48vw - 50px), calc(28vh - 90px)); }
    80% { transform: translate(calc(-28vw + 70px), calc(38vh - 40px)); }
    90% { transform: translate(calc(35vw - 90px), calc(-38vh + 95px)); }
    100% { transform: translate(0, 0); }
}
@keyframes chaosBounce2 {
    0% { transform: translate(0, 0); }

function getTengriOracle() {
    const display = document.getElementById("oracle-display");
    display.classList.add("glitch-effect");
    display.style.opacity = 0.3;
    setTimeout(() => {
        const randomIndex = Math.floor(Math.random() * oracleQuotes.length);
        display.innerText = oracleQuotes[randomIndex];
        display.style.opacity = 1;
        setTimeout(() => {
            display.classList.remove("glitch-effect");
        }, 200);
    }, 200);
}

function changeTheme(themeName, element) {
    if(themeName === 'dark') {
        document.documentElement.removeAttribute('data-theme');
    } else {
        document.documentElement.setAttribute('data-theme', themeName);
    }
    document.querySelectorAll('.theme-dot').forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
}

function showToast() {
    const toast = document.getElementById("toast-notification");
    toast.classList.add("show");
    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

function calculateMeta(tabIndex) {
    const text = document.getElementById(`input${tabIndex}`).innerText;
    const charCount = text.length;
    const wordCount = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
    document.getElementById(`char-count-${tabIndex}`).innerHTML = `Karakter: <strong>${charCount}</strong>`;
    document.getElementById(`word-count-${tabIndex}`).innerHTML = `Kelime: <strong>${wordCount}</strong>`;
}

function switchTab(tabIndex) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    event.currentTarget.classList.add('active');
    document.getElementById(`tab${tabIndex}`).classList.add('active');
}

function hardProtectBoldStyles(htmlContent) {
    return htmlContent
        .replace(/<(b|strong)>(.*?)<\/\1>/gi, "◆B◆$2◆EB◆")
        .replace(/<span[^>]*style="[^"]*font-weight:\s*bold[^"]*"[^>]*>(.*?)<\/span>/gi, "◆B◆$1◆EB◆")
        .replace(/<span[^>]*style="[^"]*font-weight:\s*700[^"]*"[^>]*>(.*?)<\/span>/gi, "◆B◆$1◆EB◆");
}

function highlight(htmlContent) {
    return htmlContent
        .replace(/◆B◆(.*?)◆EB◆/g, '<b class="protected-bold">$1</b>')
        .replace(/([^a-zA-ZçğıöşüÇĞİÖŞÜ0-9ğüşıöçĞÜŞİÖÇ\s]{10,})/g, '<span class="bad-word">$1</span>');
}

function cleanInvisibleWebGarbage(str, forceLowercase = false) {
    let clean = str
        .replace(/&nbsp;/g, " ")
        .replace(/[\u200B-\u200D\uFEFF]/g, "")
        .replace(/\s+/g, " ");
    
    clean = clean.replace(/\s{2,}/g, " ");
    if (forceLowercase) {
        clean = clean.toLocaleLowerCase('tr-TR');
    }
    return clean;
}

function copyToClipboard(elementId) {
    const element = document.getElementById(elementId);
    const clone = element.cloneNode(true);
    clone.querySelectorAll('.bad-word').forEach(el => {
        el.outerHTML = el.innerHTML;
    });
    
    let textToCopy = clone.innerHTML
        .replace(/<br\s*\/?>/gi, "\n")
        .replace(/<\/b>/gi, "")
        .replace(/<b[^>]*>/gi, "")
        .replace(/&nbsp;/g, " ")
        .replace(/&lt;/g, "<")
        .replace(/&gt;/g, ">");
        
    let tempTexarea = document.createElement("textarea");
    tempTexarea.style.position = "fixed";
    tempTexarea.style.opacity = "0";
    tempTexarea.value = textToCopy;
    document.body.appendChild(tempTexarea);
    tempTexarea.select();
    document.execCommand("copy");
    document.body.removeChild(tempTexarea);
    showToast();
}

function executeAction(tabIndex, actionType) {
    const outputElement = document.getElementById(`output${tabIndex}`);
    if (actionType === 'clearSpaces') {
        outputElement.innerHTML = processUltraEngine(`input${tabIndex}`, false);
    } else if (actionType === 'clearSpacesAndLowercase') {
        outputElement.innerHTML = processUltraEngine(`input${tabIndex}`, true);
    }
}

const timelineProgress = document.getElementById("timeline-progress");

function loadTrack(index) {
    if (index < 0 || index >= tracks.length) return;
    currentTrackIndex = index;
    const track = tracks[currentTrackIndex];
    audio.src = track.url;
    
    let fileName = track.url.split('/').pop();
    trackNameDisplay.innerText = fileName ? decodeURIComponent(fileName) : "Bilinmeyen Parça";
    trackIndexDisplay.innerText = `Track ${currentTrackIndex + 1} / ${tracks.length}`;
    
    timelineProgress.style.width = "0%";
    currentTimeDisplay.innerText = "00:00";
    totalDurationDisplay.innerText = "00:00";
}

function togglePlay() {
    if (!audio.src) { loadTrack(0); }
    if (isPlaying) { audio.pause(); } else { audio.play().catch(e => console.log("Oynatma hatası:", e)); }
}

audio.onplay = function() {
    isPlaying = true;
    playBtn.innerText = "DURAKLAT";
    document.getElementById("cyber-audio-player").classList.add("playing");
};

audio.onpause = function() {
    isPlaying = false;
    playBtn.innerText = "OYNAT";
    document.getElementById("cyber-audio-player").classList.remove("playing");
};

function nextTrack() {
    if (isShuffle) {
        let rand;
        do { rand = Math.floor(Math.random() * tracks.length); } while(rand === currentTrackIndex && tracks.length > 1);
        loadTrack(rand);
    } else {
        let next = currentTrackIndex + 1;
        if (next >= tracks.length) next = 0;
        loadTrack(next);
    }
    audio.play().catch(e => console.log(e));
}

function prevTrack() {
    let prev = currentTrackIndex - 1;
    if (prev < 0) prev = tracks.length - 1;
    loadTrack(prev);
    audio.play().catch(e => console.log(e));
}

audio.onended = function() {
    if (isLoop) {
        audio.currentTime = 0;
        audio.play().catch(e => console.log(e));
    } else {
        nextTrack();
    }
};

function toggleShuffle() {
    isShuffle = !isShuffle;
    document.getElementById("shuffle-btn").classList.toggle("active-mode", isShuffle);
}

function toggleLoop() {
    isLoop = !isLoop;
    document.getElementById("loop-btn").classList.toggle("active-mode", isLoop);
}

audio.ontimeupdate = function() {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    timelineProgress.style.width = `${pct}%`;
    currentTimeDisplay.innerText = formatTime(audio.currentTime);
    totalDurationDisplay.innerText = formatTime(audio.duration);
};

function seekTrack(event) {
    const container = document.getElementById("timeline-container");
    const rect = container.getBoundingClientRect();
    const clickX = event.clientX - rect.left;
    const width = rect.width;
    if (audio.duration) {
        audio.currentTime = (clickX / width) * audio.duration;
    }
}

function formatTime(seconds) {
    if (isNaN(seconds)) return "00:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
}

function togglePlayerMinimize() {
    const player = document.getElementById("cyber-audio-player");
    const btn = document.getElementById("player-toggle");

    if (player.classList.contains("minimized")) {

}

/* ==========================================================================
   精 KORUYUCU REGEX MOTORU (KUSURSUZ ETİKET KORUMA MİMARİSİ)
   ========================================================================== */
function processUltraEngine(inputElementId, forceLowercase = false) {
    const inputArea = document.getElementById(inputElementId);
    if (!inputArea || !inputArea.innerHTML.trim()) return "";
    
    let rawHtml = inputArea.innerHTML;
    
    // 1. Aşama: &nbsp; ve görünmez web kalıntılarını standart boşluklara dönüştür
    rawHtml = rawHtml.replace(/&nbsp;/g, " ");
    rawHtml = rawHtml.replace(/[\u200B-\u200D\uFEFF]/g, "");
    
    // 2. Aşama: HTML Etiketleri ile Metinleri ayıran Regex mimarisi
    // Bu yapı etiketlerin (b, strong, h3, ul, li, span, inline style vb.) yapısını asla bozmaz.
    let regex = /(<[^>]+>|[^<]+)/g;
    let parts = rawHtml.match(regex) || [];
    
    let processedParts = parts.map(part => {
        if (part.startsWith("<") && part.endsWith(">")) {
            // Eğer bir HTML etiketi ise dokunmadan aynen koru
            return part;
        } else {
            // Eğer metin içeriği ise aradaki fazla boşlukları teke indirge
            let cleanedText = part.replace(/\s+/g, " ");
            if (forceLowercase) {
                cleanedText = cleanedText.toLocaleLowerCase('tr-TR');
            }
            return cleanedText;
        }
    });
    
    let resultHtml = processedParts.join("");
    
    // Etiket ve metin birleşim sınırlarında kalan olası ardışık boşlukları temizle
    resultHtml = resultHtml.replace(/ {2,}/g, " ");
    
    // Küçük harfe çevirme aktifse cümle başlarını siber kurallara göre büyüt
    if (forceLowercase) {
        resultHtml = resultHtml.replace(/(^|>|[.!?]\s+)([a-zçğıöşü])/g, (m, p1, p2) => p1 + p2.toLocaleUpperCase('tr-TR'));
    }
    
    return highlight(resultHtml);
}
