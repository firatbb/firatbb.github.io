<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orijinal Super Mario Bros Nes</title>
    <style>
        /* Sayfa Tasarımı */
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #e52521; /* Mario Kırmızısı */
            text-shadow: 2px 2px #b84418;
            letter-spacing: 2px;
        }

        /* Atari Kabini Çerçevesi */
        .arcade-container {
            position: relative;
            width: 800px;
            height: 500px;
            border: 6px solid #333;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            background: #000;
        }

        /* Oyunu Çalıştıran İç Pencere */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls-info {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
            line-height: 1.5;
        }

        .btn-back {
            margin-top: 15px;
            padding: 8px 16px;
            background-color: #e52521;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-back:hover {
            background-color: #b84418;
        }
    </style>
</head>
<body>

    <h1>RETRO ATARİ SALONU</h1>
    
    <!-- Gerçek NES emülatör tabanlı Mario oyunu penceresi -->
    <div class="arcade-container">
        <iframe src="https://retro-games.github.io/embeds/super-mario-bros.html" allowfullscreen></iframe>
    </div>

    <div class="controls-info">
        <strong>Oyun İçi Kontroller:</strong><br>
        Z tuşu ile zıpla, X tuşu ile hız koşusu yap / ateş et.<br>
        Enter tuşu ile oyunu başlat (Start), Shift tuşu ile karakter seç (Select). Yön tuşları ile hareket et.
    </div>

    <a href="index.html" class="btn-back">Ana Sayfaya Dön</a>

</body>
</html>
