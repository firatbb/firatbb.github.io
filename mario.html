<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Mario Klasik</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-size: 26px;
            margin: 10px 0;
            color: #e52521;
            text-shadow: 2px 2px #b84418;
            letter-spacing: 2px;
        }
        .game-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 6px solid #333;
            border-radius: 10px;
            background: #5c94fc;
        }
        canvas {
            display: block;
            background: #5c94fc; /* Mario Gökyüzü */
        }
        .ui-info {
            margin-top: 12px;
            font-size: 14px;
            color: #bbb;
            text-align: center;
            line-height: 1.6;
        }
        .btn-back {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #e52521;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-back:hover {
            background-color: #b84418;
        }
    </style>
</head>
<body>

    <h1>RETRO ATARİ SALONU</h1>
    
    <div class="game-container">
        <canvas id="marioCanvas" width="800" height="440"></canvas>
    </div>

    <div class="ui-info">
        <strong>Kontroller:</strong> Yön Tuşları (Sağ/Sol) ile yürü. <strong>YUKARI Yön Tuşu</strong> veya <strong>Space</strong> ile zıpla.<br>
        Düşmanların (Kahverengi bloklar) üzerine zıplayarak onları ezebilirsin! Sarı kutulara alttan kafa atarak puan topla.
    </div>

    <a href="index.html" class="btn-back">Ana Sayfaya Dön</a>

<script>
const canvas = document.getElementById("marioCanvas");
const ctx = canvas.getContext("2d");

// Oyun Ayarları
const gravity = 0.5;
let cameraX = 0;
const levelWidth = 4000;
let score = 0;
let gameOver = false;
let gameWon = false;

// Oyuncu Nesnesi
const mario = {
    x: 100, y: 300, width: 30, height: 38,
    vx: 0, vy: 0, speed: 4.5, jumpForce: 11,
    grounded: false,
    facing: "right"
};

// Harita Elemanları (Zemin, Tuğlalar, Soru İşaretleri)
const platforms = [
    // Ana Zeminler
    { x: 0, y: 400, w: 900, h: 40, type: "ground" },
    { x: 1000, y: 400, w: 800, h: 40, type: "ground" },
    { x: 1900, y: 400, w: 1000, h: 40, type: "ground" },
    { x: 3000, y: 400, w: 1000, h: 40, type: "ground" },

    // Bölüm İçi Bloklar & Soru İşaretleri
    { x: 200, y: 280, w: 40, h: 40, type: "question", hit: false },
    { x: 240, y: 280, w: 40, h: 40, type: "brick" },
    { x: 280, y: 280, w: 40, h: 40, type: "question", hit: false },
    { x: 320, y: 280, w: 40, h: 40, type: "brick" },
    { x: 300, y: 160, w: 40, h: 40, type: "question", hit: false },

    // Borular
    { x: 600, y: 320, w: 60, h: 80, type: "pipe" },
    { x: 1300, y: 280, w: 60, h: 120, type: "pipe" },

    // Orta Kısım Macera Blokları
    { x: 1500, y: 280, w: 160, h: 40, type: "brick" },
    { x: 2100, y: 280, w: 40, h: 40, type: "question", hit: false },
    { x: 2140, y: 280, w: 80, h: 40, type: "brick" },

    // Bitiş Merdivenleri ve Bayrak
    { x: 3500, y: 360, w: 40, h: 40, type: "brick" },
    { x: 3540, y: 320, w: 40, h: 80, type: "brick" },
    { x: 3580, y: 280, w: 40, h: 120, type: "brick" },
    { x: 3620, y: 240, w: 40, h: 160, type: "brick" },
    
    // BİTİŞ DİREĞİ
    { x: 3800, y: 120, w: 15, h: 280, type: "flagpole" }
];

// Düşmanlar (Goomba benzeri devriye atan yaratıklar)
const enemies = [
    { x: 450, y: 370, w: 30, h: 30, vx: -1.5, alive: true },
    { x: 800, y: 370, w: 30, h: 30, vx: -1.5, alive: true },
    { x: 1150, y: 370, w: 30, h: 30, vx: -1.5, alive: true },
    { x: 1600, y: 250, w: 30, h: 30, vx: -1, alive: true },
    { x: 2300, y: 370, w: 30, h: 30, vx: -2, alive: true },
    { x: 2500, y: 370, w: 30, h: 30, vx: -1.5, alive: true }
];

// Kontroller
const keys = {};
window.addEventListener("keydown", e => { keys[e.code] = true; });
window.addEventListener("keyup", e => { keys[e.code] = false; });

// Çarpışma Algılama (AABB)
function getCollision(r1, r2) {
    let dx = (r1.x + r1.width / 2) - (r2.x + r2.w / 2);
    let dy = (r1.y + r1.height / 2) - (r2.y + r2.h / 2);
    let width = (r1.width + r2.w) / 2;
    let height = (r1.height + r2.h) / 2;

    if (Math.abs(dx) < width && Math.abs(dy) < height) {
        let oX = width - Math.abs(dx);
        let oY = height - Math.abs(dy);
        if (oX >= oY) {
            return dy > 0 ? { dir: "top", overlap: oY } : { dir: "bottom", overlap: oY };
        } else {
            return dx > 0 ? { dir: "left", overlap: oX } : { dir: "right", overlap: oX };
        }
    }
    return null;
}

function update() {
    if (gameOver || gameWon) return;

    // Yürüme
    if (keys["ArrowRight"] || keys["KeyD"]) {
        mario.vx = mario.speed;
        mario.facing = "right";
    } else if (keys["ArrowLeft"] || keys["KeyA"]) {
        mario.vx = -mario.speed;
        mario.facing = "left";
    } else {
        mario.vx = 0;
    }

    // Zıplama
    if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && mario.grounded) {
        mario.vy = -mario.jumpForce;
        mario.grounded = false;
    }

    mario.vy += gravity;
    mario.x += mario.vx;
    if (mario.x < 0) mario.x = 0;

    mario.y += mario.vy;
    mario.grounded = false;

    // Platform Çarpışmaları
    platforms.forEach(p => {
        let col = getCollision(mario, p);
        if (col) {
            if (p.type === "flagpole") {
                gameWon = true;
                return;
            }
            if (col.dir === "bottom") { // Üzerine basma
                mario.y -= col.overlap;
                mario.vy = 0;
                mario.grounded = true;
            } else if (col.dir === "top") { // Alttan kafa atma
                mario.y += col.overlap;
                mario.vy = 0;
                if (p.type === "question" && !p.hit) {
                    p.hit = true;
                    score += 200;
                }
            } else if (col.dir === "left") {
                mario.x += col.overlap;
            } else if (col.dir === "right") {
                mario.x -= col.overlap;
            }
        }
    });

    // Düşman Hareketleri ve Çarpışmaları
    enemies.forEach(e => {
        if (!e.alive) return;
        
        e.x += e.vx;
        // Düşmanların borulardan veya kenarlardan dönmesi için basit yapay zeka
        platforms.forEach(p => {
            if (p.type === "pipe" || p.type === "brick") {
                if (e.x + e.w > p.x && e.x < p.x + p.w && e.y + e.h > p.y) {
                    e.vx *= -1;
                }
            }
        });

        // Mario ile Düşman Çarpışması
        let enemyRect = { x: e.x, y: e.y, w: e.w, h: e.h };
        let col = getCollision(mario, enemyRect);
        if (col) {
            if (col.dir === "bottom" && mario.vy > 0) { // Üzerine zıpladı (Ezdi)
                e.alive = false;
                mario.vy = -7; // Yukarı zıplat
                score += 100;
            } else { // Mario yanda çarptı (Öldü)
                gameOver = true;
            }
        }
    });

    // Boşluğa düşme kontrolü
    if (mario.y > canvas.height) {
        gameOver = true;
    }

    // Kamera Takibi
    if (mario.x > canvas.width / 2) {
        cameraX = mario.x - canvas.width / 2;
    }
    if (cameraX > levelWidth - canvas.width) {
        cameraX = levelWidth - canvas.width;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Dekoratif Bulutlar ve Çalılar
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.beginPath(); ctx.arc(300, 80, 30, 0, Math.PI*2); ctx.arc(340, 80, 40, 0, Math.PI*2); ctx.arc(380, 80, 30, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(1200, 60, 30, 0, Math.PI*2); ctx.arc(1240, 60, 40, 0, Math.PI*2); ctx.arc(1280, 60, 30, 0, Math.PI*2); ctx.fill();

    // Platformları Çiz
    platforms.forEach(p => {
        if (p.type === "ground") {
            ctx.fillStyle = "#d88a38"; // Toprak
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "#4c934c"; // Çimen üst çizgisi
            ctx.fillRect(p.x, p.y, p.w, 10);
        } else if (p.type === "brick") {
            ctx.fillStyle = "#b84418"; // Tuğla
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(p.x, p.y, p.w, p.h);
        } else if (p.type === "question") {
            ctx.fillStyle = p.hit ? "#7c7c7c" : "#fcb444"; // Boşaldıysa gri, doluysa altın sarısı
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(p.x, p.y, p.w, p.h);
            if (!p.hit) {
                ctx.fillStyle = "#fff";
                ctx.font = "bold 20px Arial";
                ctx.fillText("?", p.x + 14, p.y + 26);
            }
        } else if (p.type === "pipe") {
            ctx.fillStyle = "#00a800"; // Boru gövdesi
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "#00d800"; // Boru başlığı şeridi
            ctx.fillRect(p.x - 4, p.y, p.w + 8, 24);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(p.x - 4, p.y, p.w + 8, 24);
            ctx.strokeRect(p.x, p.y + 24, p.w, p.h - 24);
        } else if (p.type === "flagpole") {
            ctx.fillStyle = "#fff"; // Direk
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = "#e52521"; // Kırmızı bayrak
            ctx.fillRect(p.x - 35, p.y + 10, 35, 25);
        }
    });

    // Düşmanları Çiz (Goomba)
    enemies.forEach(e => {
        if (!e.alive) return;
        ctx.fillStyle = "#a85400"; // Goomba kahverengisi
        ctx.fillRect(e.x, e.y, e.w, e.h);
        // Gözler
        ctx.fillStyle = "#fff";
        ctx.fillRect(e.x + 4, e.y + 6, 6, 10);
        ctx.fillRect(e.x + 20, e.y + 6, 6, 10);
    });

    // Mario'yu Çiz
    ctx.fillStyle = "#e52521"; // Ana tulum kırmızısı
    ctx.fillRect(mario.x, mario.y, mario.width, mario.height);
    
    // Mario Şapkası ve Detayları
    ctx.fillStyle = "#a85400"; // Kahverengi saç/ayakkabı
    ctx.fillRect(mario.x, mario.y + mario.height - 6, mario.width, 6); // Ayakkabı
    ctx.fillStyle = "#fcb444"; // Ten rengi yüz
    let faceX = mario.facing === "right" ? mario.x + 10 : mario.x;
    ctx.fillRect(faceX, mario.y + 4, 20, 14);
    ctx.fillStyle = "#e52521"; // Şapka
    ctx.fillRect(mario.x, mario.y, mario.width, 6);

    ctx.restore();

    // Üst Arayüz (Skor)
    ctx.fillStyle = "#fff";
    ctx.font = "bold 20px 'Courier New'";
    ctx.fillText(`MARIO   SKOR: ${score}`, 20, 35);

    // Oyun Bitiş Ekranları
    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff2222";
        ctx.font = "bold 40px Arial";
        ctx.fillText("GAME OVER 💀", 260, 200);
        ctx.fillStyle = "#fff";
        ctx.font = "18px Arial";
        ctx.fillText("Tekrar oynamak için sayfayı yenileyin.", 240, 250);
    }

    if (gameWon) {
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00f000";
        ctx.font = "bold 40px Arial";
        ctx.fillText("TEBRİKLER! PRENSESİ KURTARDINIZ 👑🎉", 50, 200);
        ctx.fillStyle = "#fff";
        ctx.font = "18px Arial";
        ctx.fillText("Bölümü başarıyla bitirdiniz! Yeniden başlamak için sayfayı yenileyin.", 110, 250);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
