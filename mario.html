<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orijinal Super Mario Bros (1985)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #e52521;
            text-shadow: 2px 2px #b84418;
            letter-spacing: 2px;
        }

        /* Atari Ekran Çerçevesi */
        .arcade-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 480px;
            border: 6px solid #333;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            background: #000;
        }

        /* Orijinal Oyunu Yükleyen Güvenli Alternatif Link */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls-info {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
            line-height: 1.5;
        }

        .btn-back {
            margin-top: 15px;
            padding: 8px 16px;
            background-color: #e52521;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-back:hover {
            background-color: #b84418;
        }
    </style>
</head>
<body>

    <h1>RETRO ATARİ SALONU</h1>
    
    <div class="arcade-container">
        <!-- Orijinal NES Mario'nun en stabil çalışan açık kaynaklı web emülasyonu -->
        <iframe src="https://wayou.github.io/Super-Mario-Bros/" allowfullscreen></iframe>
    </div>

    <div class="controls-info">
        <strong>Oyun Başlatma:</strong> Bilgisayarda Enter tuşuna basarak (veya ekrana dokunarak) oyunu başlatabilirsin.<br>
        <strong>Hareket:</strong> Yön tuşları veya A/D. <strong>Zıplama:</strong> Shift / Z tuşu. <strong>Hızlı Koşu/Ateş:</strong> Ctrl / X tuşu.
    </div>

    <a href="index.html" class="btn-back">Ana Sayfaya Dön</a>

</body>
</html>
