<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros. (1985) - Orijinal Sürüm</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #e52521;
            text-shadow: 2px 2px #b84418;
            letter-spacing: 2px;
        }

        /* Atari Kabini Tasarımı */
        .arcade-container {
            position: relative;
            width: 100%;
            max-width: 720px;
            height: 480px;
            border: 6px solid #222;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            background: #000;
        }

        /* Kurumsal filtrelerin asla engelleyemediği temiz GitHub Pages klonu */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls-info {
            margin-top: 15px;
            font-size: 13px;
            color: #aaa;
            text-align: center;
            line-height: 1.5;
            background-color: #1a1a1a;
            padding: 10px 20px;
            border-radius: 6px;
        }

        .btn-back {
            margin-top: 15px;
            padding: 8px 18px;
            background-color: #e52521;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-back:hover {
            background-color: #b84418;
        }
    </style>
</head>
<body>

    <h1>RETRO ATARİ SALONU</h1>
    
    <div class="arcade-container">
        <iframe src="https://thegimmick.github.io/fullscreenmario/" allowfullscreen></iframe>
    </div>

    <div class="controls-info">
        <strong>🎮 OYUN KONTROLLERİ:</strong><br>
        Oyun ekranına bir kez tıkla. Oyunu başlatmak için klavyeden <strong>P</strong> veya <strong>Enter</strong> tuşuna bas.<br>
        <strong>Hareket:</strong> Yön Tuşları / WASD | <strong>Zıplama:</strong> Yukarı Ok / W / Boşluk (Space) | <strong>Hızlı Koşu:</strong> Shift
    </div>

    <a href="index.html" class="btn-back">Ana Sayfaya Dön</a>

</body>
</html>
